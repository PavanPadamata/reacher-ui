services:
  postgres:
    image: postgres:16-alpine
    container_name: reacher-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: reacher
      POSTGRES_PASSWORD: reacher_secret
      POSTGRES_DB: reacher
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reacher-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reacher"]
      interval: 5s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reacher-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://reacher:reacher_secret@postgres:5432/reacher
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - AUTH_SECRET=change-this-to-a-random-secret-string-min-32-chars
      - REACHER_FROM_EMAIL=verify@nyelizabeth.net
      - REACHER_HELLO_NAME=verify.nyelizabeth.net
      # ── Reacher backends (comma-separated, add as many as you have) ──
      # Format: http://VPS1_IP:8080,http://VPS2_IP:8080,http://VPS3_IP:8080
      - REACHER_BACKEND_URLS=http://VPS1_IP:8080,http://VPS2_IP:8080
      # ── Daily limit per backend (emails/day per VPS) ──
      - REACHER_DAILY_LIMIT_PER_BACKEND=50000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - reacher-net

volumes:
  postgres_data:

networks:
  reacher-net:
    driver: bridge
